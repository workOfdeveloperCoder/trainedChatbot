<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AI Chat</title>

   <style>
:root{
    --bg:#0b1020;
    --surface:#131a2e;
    --surface2:#1a2238;
    --primary:#7c3aed;
    --primary2:#8b5cf6;
    --text:#f8fafc;
    --muted:#94a3b8;
    --border:rgba(255,255,255,.08);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    color:var(--text);
    overflow:hidden;

    background:
        radial-gradient(circle at top,#6d28d933 0%,transparent 35%),
        radial-gradient(circle at bottom right,#2563eb22 0%,transparent 35%),
        #0b1020;
}

/* soft glow */
body::before{
    content:"";
    position:fixed;
    width:650px;
    height:650px;
    left:50%;
    top:-250px;
    transform:translateX(-50%);
    background:#7c3aed;
    filter:blur(180px);
    opacity:.12;
    pointer-events:none;
}

.container{
    width:100%;
    max-width:950px;
    height:100vh;
    display:flex;
    flex-direction:column;
}

.header{
    height:72px;
    display:flex;
    align-items:center;
    justify-content:center;

    font-size:20px;
    font-weight:600;
    letter-spacing:.5px;

    background:rgba(11,16,32,.75);
    backdrop-filter:blur(20px);

    border-bottom:1px solid var(--border);
}

#chat{
    flex:1;
    overflow-y:auto;
    padding:40px 35px;
    scroll-behavior:smooth;
}

.message{
    display:flex;
    margin:28px 0;
    animation:appear .25s ease;
}

.user{
    justify-content:flex-end;
}

.assistant{
    justify-content:flex-start;
}

.bubble{
    max-width:78%;
    padding:18px 22px;
    border-radius:22px;

    line-height:1.8;
    font-size:15px;

    white-space:pre-wrap;
    word-break:break-word;
}

.user .bubble{

    background:
        linear-gradient(135deg,#7c3aed,#8b5cf6);

    color:white;

    box-shadow:
        0 15px 45px rgba(124,58,237,.35);

}

.assistant .bubble{

    background:rgba(255,255,255,.05);

    border:1px solid var(--border);

    backdrop-filter:blur(18px);

    box-shadow:
        0 15px 45px rgba(0,0,0,.18);

}

.input-area{

    padding:22px;

    background:rgba(11,16,32,.78);

    backdrop-filter:blur(20px);

    border-top:1px solid var(--border);

}

.input-box{
    display:flex;
    gap:14px;
    align-items:flex-end;
}

textarea{

    flex:1;

    resize:none;

    height:60px;

    padding:18px;

    border-radius:18px;

    outline:none;

    border:1px solid var(--border);

    background:#151c31;

    color:white;

    font-size:15px;

    transition:.25s;

}

textarea::placeholder{
    color:#64748b;
}

textarea:focus{

    border-color:#8b5cf6;

    box-shadow:
        0 0 0 4px rgba(124,58,237,.18);

}

button{

    width:110px;

    height:60px;

    border:none;

    border-radius:18px;

    cursor:pointer;

    color:white;

    font-size:15px;

    font-weight:600;

    background:
        linear-gradient(135deg,#7c3aed,#8b5cf6);

    transition:.25s;

    box-shadow:
        0 12px 35px rgba(124,58,237,.30);

}

button:hover{

    transform:translateY(-2px);

    box-shadow:
        0 18px 45px rgba(124,58,237,.45);

}

button:active{
    transform:scale(.98);
}

::-webkit-scrollbar{
    width:8px;
}

::-webkit-scrollbar-thumb{
    background:#2d3657;
    border-radius:999px;
}

::-webkit-scrollbar-track{
    background:transparent;
}

@keyframes appear{

    from{
        opacity:0;
        transform:translateY(8px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }

}
</style>

</head>

<body>

<div class="container">

    <div class="header">
        AI Chat
    </div>

    <div id="chat"></div>

    <div class="input-area">

        <div class="input-box">

            <textarea
                id="prompt"
                placeholder="Message AI..."></textarea>

            <button onclick="sendMessage()">
                Send
            </button>

        </div>

    </div>

</div>

<script>

async function sendMessage() {

    const textarea = document.getElementById("prompt");

    const message = textarea.value.trim();

    if (!message) return;

    const chat = document.getElementById("chat");

    // User message
    chat.innerHTML += `
        <div class="message user">
            <div class="bubble">${escapeHtml(message)}</div>
        </div>
    `;

    textarea.value = "";

    // Assistant message
    const assistant = document.createElement("div");
    assistant.className = "message assistant";

    assistant.innerHTML = `
        <div class="bubble"></div>
    `;

    chat.appendChild(assistant);

    const bubble = assistant.querySelector(".bubble");

    const textNode = document.createTextNode("");

    bubble.appendChild(textNode);

    chat.scrollTop = chat.scrollHeight;

    const response = await fetch(
        "http://localhost:3000/api/chat",
        {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                message: message
            })
        }
    );

    const reader = response.body.getReader();
    const decoder = new TextDecoder();

    let buffer = "";
    let displayed = "";
    let finished = false;

    
    async function animate() {

        while (!finished || buffer.length > 0) {

            if (buffer.length > 0) {

                // <-- nextChunk is created here
                const nextChunk = buffer.slice(0, 4);

                buffer = buffer.slice(4);

                textNode.appendData(nextChunk);

                chat.scrollTop = chat.scrollHeight;
            }

            await new Promise(requestAnimationFrame);
        }
    }

    animate(); 

   while (true) {

        const { done, value } = await reader.read();

        if (done) {
            finished = true;
            break;
        }

        buffer += decoder.decode(value, { stream: true });
    }
}

function escapeHtml(text) {

    const div = document.createElement("div");

    div.textContent = text;

    return div.innerHTML;
}

document
.getElementById("prompt")
.addEventListener("keydown", function(e){

    if(e.key==="Enter" && !e.shiftKey){

        e.preventDefault();

        sendMessage();

    }

});

</script>

</body>

</html>
